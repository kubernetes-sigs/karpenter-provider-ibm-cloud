# Spot-only NodePool. IBM Cloud can reclaim spot capacity at any time, so
# schedule only interruption-tolerant workloads here.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
      nodeClassRef:
        group: karpenter-ibm.sh
        kind: IBMNodeClass
        name: default
      expireAfter: 12h
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    # 300s gives CNI (Calico) time to initialize before consolidation removes
    # the node (see docs/vpc-integration.md, "CNI Initialization Timing Issues").
    consolidateAfter: 300s
  limits:
    cpu: "1000"
    memory: 1000Gi
---
# Spot with on-demand fallback. Karpenter prefers spot whenever a spot
# offering is available. After an interruption, spot is marked unavailable
# for 1h and on-demand is used.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot-with-fallback
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
      nodeClassRef:
        group: karpenter-ibm.sh
        kind: IBMNodeClass
        name: default
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 300s
  limits:
    cpu: "1000"
    memory: 1000Gi
