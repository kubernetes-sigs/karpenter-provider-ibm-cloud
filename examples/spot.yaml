# Spot-only NodePool. Spot nodes can be reclaimed by IBM Cloud at any time;
# expireAfter rotates them before they accumulate long-lived state.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
      nodeClassRef:
        group: karpenter-ibm.sh
        kind: IBMNodeClass
        name: default
      expireAfter: 12h
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    # 300s gives CNI (Calico) time to initialize before consolidation may
    # remove the node; lower values can cause a create/terminate loop.
    # See docs/vpc-integration.md, "CNI Initialization Timing Issues".
    consolidateAfter: 300s
  limits:
    cpu: "1000"
---
# Spot with on-demand fallback. Karpenter picks spot on price; on-demand is
# used while spot offerings are marked unavailable (e.g. after interruptions).
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot-with-fallback
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
      nodeClassRef:
        group: karpenter-ibm.sh
        kind: IBMNodeClass
        name: default
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 300s
  limits:
    cpu: "1000"
