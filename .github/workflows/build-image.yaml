name: Build Container Image

on:
  workflow_call:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        type: string
      additional_tags:
        description: 'Additional tags (comma-separated)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64,linux/s390x'
      version:
        description: 'Version to embed in binary'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to checkout (defaults to triggering ref)'
        required: false
        type: string
        default: ''
    outputs:
      image_ref:
        description: 'Full image reference'
        value: ${{ jobs.build.outputs.image_ref }}
      image_tag:
        description: 'Image tag used'
        value: ${{ jobs.build.outputs.image_tag }}
    secrets:
      QUAY_USERNAME:
        required: false
      QUAY_PASSWORD:
        required: false

env:
  GO_VERSION: '1.25'
  KO_DOCKER_REPO: quay.io/karpenter-provider-ibm-cloud/controller

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_tag: ${{ inputs.tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d  # v0.9

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to quay.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push image
        id: build
        run: |
          # Build all tags in single ko build call
          ALL_TAGS="${{ inputs.tag }}"
          if [ -n "${{ inputs.additional_tags }}" ]; then
            ALL_TAGS="${ALL_TAGS},${{ inputs.additional_tags }}"
          fi

          echo "Building with tags: $ALL_TAGS"

          # Build with or without version ldflags
          if [ -n "${{ inputs.version }}" ]; then
            GOFLAGS="-ldflags=-X=github.com/kubernetes-sigs/karpenter-provider-ibm-cloud/pkg/version.Version=${{ inputs.version }}" \
            ko build \
              --platform=${{ inputs.platforms }} \
              --bare \
              --tags=$ALL_TAGS \
              ./cmd/controller
          else
            ko build \
              --platform=${{ inputs.platforms }} \
              --bare \
              --tags=$ALL_TAGS \
              ./cmd/controller
          fi

          echo "image_ref=$KO_DOCKER_REPO:${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Verify manifest
        run: |
          echo "Verifying manifest for $KO_DOCKER_REPO:${{ inputs.tag }}..."
          docker buildx imagetools inspect $KO_DOCKER_REPO:${{ inputs.tag }}
