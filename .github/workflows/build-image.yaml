name: Build Container Image

on:
  workflow_call:
    inputs:
      tag:
        description: 'Image tag'
        required: true
        type: string
      additional_tags:
        description: 'Additional tags (comma-separated)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64,linux/s390x'
      version:
        description: 'Version to embed in binary'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to checkout (defaults to triggering ref)'
        required: false
        type: string
        default: ''
    outputs:
      image_ref:
        description: 'Full image reference'
        value: ${{ jobs.build.outputs.image_ref }}
      image_tag:
        description: 'Image tag used'
        value: ${{ jobs.build.outputs.image_tag }}
    secrets:
      QUAY_USERNAME:
        required: false
      QUAY_PASSWORD:
        required: false

env:
  GO_VERSION: '1.26'
  KO_DOCKER_REPO: quay.io/karpenter-provider-ibm-cloud/controller

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      image_tag: ${{ inputs.tag }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445  # v0.10

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push image
        id: build
        run: |
          # Build all tags in single ko build call
          ALL_TAGS="${{ inputs.tag }}"
          if [ -n "${{ inputs.additional_tags }}" ]; then
            ALL_TAGS="${ALL_TAGS},${{ inputs.additional_tags }}"
          fi

          echo "Building with tags: $ALL_TAGS"

          # Build with or without version ldflags
          if [ -n "${{ inputs.version }}" ]; then
            GOFLAGS="-ldflags=-X=github.com/kubernetes-sigs/karpenter-provider-ibm-cloud/pkg/version.Version=${{ inputs.version }}" \
            ko build \
              --platform=${{ inputs.platforms }} \
              --bare \
              --tags=$ALL_TAGS \
              ./cmd/controller
          else
            ko build \
              --platform=${{ inputs.platforms }} \
              --bare \
              --tags=$ALL_TAGS \
              ./cmd/controller
          fi

          echo "image_ref=$KO_DOCKER_REPO:${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Verify manifest
        run: |
          echo "Verifying manifest for $KO_DOCKER_REPO:${{ inputs.tag }}..."
          docker buildx imagetools inspect $KO_DOCKER_REPO:${{ inputs.tag }}
