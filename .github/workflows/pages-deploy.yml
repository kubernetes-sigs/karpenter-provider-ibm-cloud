name: Deploy Documentation and Helm Charts to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'charts/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.x'

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4
        with:
          version: '3.12.0'

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs and dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation
        run: mkdocs build

      - name: Package Helm charts
        run: |
          mkdir -p _helm-repo

          # Download existing index to preserve prior chart versions
          echo "Downloading existing index.yaml..."
          curl -s https://karpenter-ibm.sh/index.yaml > _helm-repo/old-index.yaml || echo "No existing index found"

          if [ -f "charts/Chart.yaml" ]; then
            echo "Packaging chart: charts/"
            helm package charts/ --destination _helm-repo
          fi

          if [ -f "_helm-repo/old-index.yaml" ] && [ -s "_helm-repo/old-index.yaml" ]; then
            echo "Merging with existing index..."
            helm repo index _helm-repo --url https://karpenter-ibm.sh --merge _helm-repo/old-index.yaml
          else
            echo "Creating new index..."
            helm repo index _helm-repo --url https://karpenter-ibm.sh
          fi

          rm -f _helm-repo/old-index.yaml

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          cp _helm-repo/*.tgz _site/ 2>/dev/null || true
          cp _helm-repo/index.yaml _site/
          cp docs/CNAME _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
